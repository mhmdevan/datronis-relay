name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - ".github/workflows/docs.yml"
      - "README.md"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install docs deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[docs]"
      - name: Build site (strict)
        run: mkdocs build --strict
      # `enablement: true` makes this action *create* the Pages site on first
      # run instead of expecting it to already exist. Without it, a brand-new
      # repo hits HTTP 404 on `GET /repos/{owner}/{repo}/pages` and the job
      # fails until a maintainer manually clicks Settings → Pages → Source:
      # GitHub Actions. With it, every fresh fork self-bootstraps on first push.
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
