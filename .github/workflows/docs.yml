name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - ".github/workflows/docs.yml"
      - "README.md"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install docs deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[docs]"
      - name: Build site (strict)
        run: mkdocs build --strict
      # Note on `enablement: true`:
      #
      # This parameter tells the action to *create* the Pages site if it
      # doesn't exist yet — but creation requires a token with repo
      # Administration scope. The default `GITHUB_TOKEN` available to
      # workflows does NOT have that scope (creating a Pages site is a
      # repo-admin action, not a CI action), so the POST will 403 on a
      # fresh repo.
      #
      # Real first-run bootstrap is a one-time manual step:
      #   Settings → Pages → Source: GitHub Actions → Save
      #
      # After that single click, the site exists at the API level and
      # every subsequent run succeeds with the default token. We keep
      # `enablement: true` here as a harmless safety net — it's a no-op
      # when the site already exists, and it does the right thing if
      # this workflow ever runs under a PAT / GitHub App token that has
      # Administration scope.
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
